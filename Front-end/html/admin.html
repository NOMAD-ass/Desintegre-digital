<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/admin.css">
    <script defer src="../js/admin.js"></script>
    <title>Painel administrativo - Desintegre Digital</title>
</head>
<body class="tema-escuro">

    <nav class="admin-nav">
        <a href="inicial.html" class="logo-placeholder" style="font-weight: 700; color: var(--secondary-color);">Desintegre</a>
        <div class="admin-nav-info">
            <span id="adminNomeLogado">-</span>
            <button id="botaoSairAdmin" class="admin-botao-sair">Sair</button>
        </div>
    </nav>

    <main class="admin-conteudo">
        <h1>Pedidos de destruição</h1>
        <p class="admin-subtitulo">
            Envie o certificado oficial em PDF para os pedidos já concluídos. O arquivo enviado
            fica disponível para o cliente baixar na página de acompanhamento.
        </p>

        <div id="mensagemAdmin" class="feedback hidden"></div>

        <div class="admin-filtros">
            <label for="filtroStatus">Filtrar por status:</label>
            <select id="filtroStatus">
                <option value="todos">Todos</option>
                <option value="recebido">Recebido</option>
                <option value="em_andamento">Em andamento</option>
                <option value="concluido" selected>Concluído</option>
            </select>
            <button id="botaoAtualizarLista" class="admin-botao-secundario">Atualizar</button>
        </div>

        <div id="listaPedidos" class="admin-lista-pedidos">
            <p class="admin-carregando">Carregando pedidos...</p>
        </div>
    </main>

</body>
</html>
